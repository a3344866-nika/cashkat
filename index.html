<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashKat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
/* ═══ THEMES ═══════════════════════════════════════════ */
:root,[data-theme="light"]{
  --bg:#f0f2f5; --surface:#fff; --s2:#f8f9fa;
  --border:#e1e4e8; --border2:#cdd0d6; --text:#1a1d23; --muted:#6e7681;
  --income:#16a34a; --expense:#dc2626; --accent:#2563eb;
  --pos:#16a34a; --neg:#dc2626; --savings:#7c3aed; --debt-c:#9f1239;
  --sb-bg:#fff; --sb-border:#e1e4e8; --sb-active:#dbeafe; --sb-act:#1d4ed8;
  --sb-hover:#f3f4f6; --hdr-bg:#fff;
  --yr-bg:#eff6ff; --yr-txt:#1d4ed8; --yr-hid-bg:#e5e7eb; --yr-hid-txt:#6b7280;
  --mo-bg:#f9fafb; --mo-txt:#6b7280;
  --tot-inc:#dcfce7; --tot-exp:#fee2e2; --bal-bg:#dbeafe; --bal-txt:#1d4ed8;
  --row-alt:#fafbfc; --cur-col:#eff6ff;
  --inp-h:rgba(37,99,235,.06); --inp-f:rgba(37,99,235,.1);
  --dc-bg:#fefce8; --dc-brd:#ca8a04; --dp-bg:#f9fafb; --dp-txt:#9ca3af;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --card-bg:#fff; --card-border:#e5e7eb;
  --goal-grad:linear-gradient(90deg,#047857,#10b981);
  --goal-cl:#047857;
}
[data-theme="dark"]{
  --bg:#0B0C15; --surface:#151621; --s2:#191B28;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.10); --text:#EDEEF5; --muted:rgba(237,238,245,0.50);
  --income:#22C55E; --expense:#EF4444; --accent:#06B6D4;
  --pos:#22C55E; --neg:#EF4444; --savings:#8B5CF6; --debt-c:#F5A524;
  --sb-bg:#0E0F1A; --sb-border:rgba(255,255,255,0.06); --sb-active:rgba(139,92,246,0.18); --sb-act:#8B5CF6;
  --sb-hover:rgba(255,255,255,0.05); --hdr-bg:#0E0F1A;
  --yr-bg:rgba(139,92,246,0.12); --yr-txt:#8B5CF6; --yr-hid-bg:#191B28; --yr-hid-txt:rgba(237,238,245,0.30);
  --mo-bg:#151621; --mo-txt:rgba(237,238,245,0.45);
  --tot-inc:rgba(34,197,94,0.08); --tot-exp:rgba(239,68,68,0.08); --bal-bg:rgba(6,182,212,0.07); --bal-txt:#06B6D4;
  --row-alt:rgba(255,255,255,0.015); --cur-col:rgba(6,182,212,0.05);
  --inp-h:rgba(139,92,246,0.08); --inp-f:rgba(139,92,246,0.12);
  --dc-bg:rgba(245,165,36,0.10); --dc-brd:#F5A524; --dp-bg:#191B28; --dp-txt:rgba(237,238,245,0.25);
  --shadow:0 8px 32px rgba(0,0,0,0.5);
  --card-bg:#151621; --card-border:rgba(255,255,255,0.06);
  --goal-grad:linear-gradient(90deg,#047857,#10b981);
  --goal-cl:#10b981;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
     background:var(--bg);color:var(--text);font-size:12.5px}
/* ═══ BACKGROUND GLOWS ═══════════════════════════════ */
.bg-glows{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.glow{position:absolute;border-radius:50%;filter:blur(80px)}
.glow-1{width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(139,92,246,0.18),transparent 70%)}
.glow-2{width:500px;height:500px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(6,182,212,0.12),transparent 70%)}
.glow-3{width:400px;height:400px;top:40%;left:40%;background:radial-gradient(circle,rgba(34,197,94,0.06),transparent 70%)}

/* ═══ LOGIN ════════════════════════════════════════════ */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0B0C15;
  position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;width:600px;height:600px;top:-200px;left:-100px;
  background:radial-gradient(circle,rgba(139,92,246,0.18),transparent 70%);border-radius:50%}
#login-screen::after{content:'';position:absolute;width:500px;height:500px;bottom:-100px;right:-100px;
  background:radial-gradient(circle,rgba(6,182,212,0.12),transparent 70%);border-radius:50%}
.login-box{background:linear-gradient(160deg,rgba(255,255,255,0.05),rgba(255,255,255,0.015));
           border:1px solid rgba(255,255,255,0.08);border-radius:24px;
           backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
           padding:48px 40px;text-align:center;max-width:360px;width:100%;
           box-shadow:0 24px 60px rgba(0,0,0,0.6);position:relative;z-index:1}
.login-logo{font-size:56px;margin-bottom:12px}
.login-box h1{font-size:26px;font-weight:700;margin-bottom:6px;color:#EDEEF5}
.login-box p{color:rgba(237,238,245,0.5);font-size:13px;margin-bottom:28px;line-height:1.5}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
            padding:11px 20px;border-radius:10px;
            background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
            cursor:pointer;font-size:13.5px;font-weight:500;color:#EDEEF5;
            transition:all .2s}
.google-btn:hover{background:rgba(255,255,255,0.13);transform:translateY(-1px)}
.dev-notice{margin-top:14px;padding:10px 14px;
            background:rgba(245,165,36,0.1);border:1px solid rgba(245,165,36,0.25);
            border-radius:10px;color:#F5A524;font-size:11px}
.dev-btn{margin-top:8px;padding:5px 14px;border:1px solid rgba(245,165,36,0.3);
         background:rgba(245,165,36,0.1);
         border-radius:6px;cursor:pointer;font-size:11px;color:#F5A524}

/* ═══ LOADING ══════════════════════════════════════════ */
#loading-screen{display:none;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
         border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ APP LAYOUT ════════════════════════════════════════ */
#app{display:none}
.app-layout{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}

/* ═══ SIDEBAR ══════════════════════════════════════════ */
.sidebar{width:64px;flex-shrink:0;
         background:rgba(14,15,26,0.85);
         border-right:1px solid var(--sb-border);
         backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
         display:flex;flex-direction:column;z-index:200;
         box-shadow:4px 0 24px rgba(0,0,0,0.3)}
.sb-logo{padding:16px 0;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--sb-border)}
.sb-logo-icon{font-size:28px}
.sb-logo-text{display:none}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;align-items:center;gap:4px}
.sb-section-label{display:none}
.nav-item{display:flex;align-items:center;justify-content:center;
          border-radius:15px;cursor:pointer;font-size:20px;
          transition:all .2s;margin-bottom:0;border:1px solid transparent;
          background:transparent;width:48px;height:48px;opacity:.45;
          position:relative}
.nav-item:hover{opacity:.85;background:var(--sb-hover)}
.nav-item.active{opacity:1;background:var(--sb-active);border-color:rgba(139,92,246,0.30)}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:22px;border-radius:3px;background:#8B5CF6;box-shadow:0 0 10px #8B5CF6}
.nav-item[title]:hover::after{content:attr(title);position:absolute;left:calc(100% + 10px);top:50%;
  transform:translateY(-50%);background:#22243A;color:var(--text);
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:9px;
  white-space:nowrap;pointer-events:none;z-index:999;
  border:1px solid var(--border);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.nav-icon{font-size:20px;width:20px;text-align:center;flex-shrink:0}
.nav-label{display:none}
.sb-bottom{padding:10px 4px;border-top:1px solid var(--sb-border);display:flex;flex-direction:column;align-items:center;gap:4px}
.sb-user{display:flex;align-items:center;justify-content:center;padding:4px;border-radius:8px;margin-bottom:2px}
.sb-avatar{width:28px;height:28px;border-radius:50%;border:1px solid var(--border)}
.sb-username{display:none}
.theme-row{display:none}
.theme-pill{display:none}
.sb-signout{display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;
            cursor:pointer;color:var(--muted);font-size:16px;transition:all .15s;
            border:none;background:transparent;width:40px;height:40px;margin-top:2px;position:relative}
.sb-signout:hover{background:var(--sb-hover);color:var(--neg)}
.sb-signout[title]:hover::after{content:attr(title);position:absolute;left:calc(100% + 8px);top:50%;
  transform:translateY(-50%);background:#1a1d23;color:#fff;padding:4px 8px;border-radius:6px;
  font-size:11px;white-space:nowrap;pointer-events:none;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.dev-badge{font-size:11px;background:rgba(245,165,36,0.12);border:1px solid rgba(245,165,36,0.3);color:#F5A524;
           padding:4px 6px;border-radius:8px;margin:2px 0;display:block;text-align:center}

/* ═══ MAIN ══════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;
      background:transparent}
.hdr{display:none}
.hdr-title{font-size:14px;font-weight:600}
.hdr-sub{color:var(--muted);font-size:11px;flex:1}
.save-ind{font-size:10px;color:var(--pos);opacity:0;transition:opacity .3s}
.save-ind.show{opacity:1}

/* ═══ TAB CONTENT ═══════════════════════════════════════ */
.tab-content{display:none;flex:1;overflow:hidden}
.tab-content.active{display:flex;flex-direction:column}

/* ═══ BALANCE TAB — TABLE ══════════════════════════════ */
.wrap{flex:1;overflow:auto}
table{border-collapse:separate;border-spacing:0;background:var(--surface);table-layout:fixed}
th,td{padding:5px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);
      white-space:nowrap;text-align:right;vertical-align:middle}
/* hover rows */
tbody tr.r-inc:hover td,tbody tr.r-goal:hover td,tbody tr.r-placeholder:not(:hover) td{background:rgba(255,255,255,0.015)}
tbody tr:not(.ctog):not(.r-hdg):not(.r-ti):not(.r-te):not(.r-net):not(.r-bal):not(.r-tat):not(.r-tsa):not(.r-tdt):not(.r-tgoals):not(.r-sp):hover td{background:rgba(255,255,255,0.025)}

/* sticky cols (horizontal) */
.cl{position:sticky;left:0;width:210px;min-width:210px;text-align:left;z-index:5;
    background:var(--surface);border-right:1px solid var(--border2)}
.cd{position:sticky;left:210px;width:50px;min-width:50px;text-align:center;z-index:5;
    background:var(--surface);border-right:2px solid var(--border2);color:var(--muted);font-size:11px}

/* JS-sticky thead — no CSS top:sticky needed */
thead{position:relative;z-index:20;will-change:transform}
thead tr.yr-row th{background:var(--yr-bg);color:var(--yr-txt);font-weight:800;font-size:14px;
                   text-align:center;padding:0 16px;height:44px;line-height:44px;
                   z-index:15;cursor:pointer;user-select:none;
                   border-bottom:2px solid var(--border2)}
thead tr.yr-row th:hover{filter:brightness(.97)}
thead tr.yr-row th.yr-collapsed{background:var(--yr-hid-bg);color:var(--yr-hid-txt);
                                 font-size:11px;font-weight:600;writing-mode:vertical-rl;
                                 text-orientation:mixed;line-height:1;padding:8px 4px;height:auto}
thead tr.yr-row th.cl,thead tr.yr-row th.cd{background:var(--surface);cursor:default;
                                             font-size:11px;font-weight:500;color:var(--muted);z-index:22}
thead tr.mo-row th{background:var(--mo-bg);color:var(--mo-txt);font-weight:500;font-size:11px;
                   z-index:14;padding:5px 10px;user-select:none}
thead tr.mo-row th.cur{color:var(--accent);background:var(--cur-col);font-weight:600}
thead tr.mo-row th.mo-clickable{cursor:pointer;position:relative}
thead tr.mo-row th.mo-clickable:hover{color:var(--accent)}
thead tr.mo-row th.cl,thead tr.mo-row th.cd{cursor:default;z-index:21;background:var(--surface)}
th.yr-anc-mo{background:var(--yr-hid-bg)}
/* collapsed month header — rotated via absolute span */
thead tr.mo-row{height:28px}
thead tr.mo-row th.mo-hid{background:var(--yr-hid-bg);color:var(--yr-hid-txt);
  font-size:9px;font-weight:600;padding:0;cursor:pointer;user-select:none;
  width:20px;height:28px;overflow:hidden;position:relative}
thead tr.mo-row th.mo-hid:hover{color:var(--accent)}
.mo-hid-lbl{position:absolute;left:50%;top:50%;white-space:nowrap;
            transform:translate(-50%,-50%) rotate(-90deg);font-size:9px;font-weight:600;pointer-events:none}
/* collapsed month data cell */
td.mo-hid-cell{overflow:hidden;padding:0!important;background:var(--yr-hid-bg);
               max-width:20px;border-right:1px solid var(--border)}
td.mo-hid-cell *{display:none}
.resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;background:transparent;z-index:2}
.resize-handle:hover{background:var(--accent);opacity:.4}

/* ═══ SECTION HEADERS ══════════════════════════════════ */
/* parent heading (non-interactive, e.g. РАСХОДЫ) */
tr.r-hdg td{padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:#fff;border-bottom:none;border-top:1px solid rgba(0,0,0,.08)}
tr.r-hdg-exp td{background:#1d4ed8}
tr.r-hdg-exp td.cl,tr.r-hdg-exp td.cd{background:#1d4ed8!important}
[data-theme="dark"] tr.r-hdg-exp td{background:rgba(99,102,241,0.15)}
[data-theme="dark"] tr.r-hdg-exp td.cl,[data-theme="dark"] tr.r-hdg-exp td.cd{background:rgba(99,102,241,0.15)!important}

/* ctog rows (interactive section headers) */
tr.ctog td{border-bottom:none;border-top:1px solid rgba(0,0,0,.06);
           padding:6px 14px 6px 28px;font-size:10.5px;font-weight:600;
           letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
           user-select:none;text-align:left!important;color:#fff}
tr.ctog-inc td{background:#16a34a;padding-left:14px}
/* sub-sections under РАСХОДЫ — lighter blue, left border indent */
tr.ctog-fix td,tr.ctog-var td{background:#3b82f6}
tr.ctog-fix td.cl,tr.ctog-var td.cl{border-left:4px solid rgba(255,255,255,.35)!important}
tr.ctog-fix .sec-inner,tr.ctog-var .sec-inner{padding-left:6px}
tr.ctog-acc td{background:#111827}                     /* счета — black */
tr.ctog-sav td{background:#7c3aed}
tr.ctog-dbt td{background:#9f1239}
tr.ctog-goals td{background:#059669;padding-left:14px}
tr.ctog:hover td{filter:brightness(1.08)}

/* sticky cells match section color */
tr.ctog-inc td.cl,tr.ctog-inc td.cd{background:#16a34a!important}
tr.ctog-fix td.cl,tr.ctog-fix td.cd{background:#3b82f6!important}
tr.ctog-var td.cl,tr.ctog-var td.cd{background:#3b82f6!important}
tr.ctog-acc td.cl,tr.ctog-acc td.cd{background:#111827!important}
tr.ctog-sav td.cl,tr.ctog-sav td.cd{background:#7c3aed!important}
tr.ctog-dbt td.cl,tr.ctog-dbt td.cd{background:#9f1239!important}
tr.ctog-goals td.cl,tr.ctog-goals td.cd{background:#059669!important}

/* dark theme section header — muted glass tones */
[data-theme="dark"] tr.ctog-inc td{background:rgba(34,197,94,0.18)}
[data-theme="dark"] tr.ctog-inc td.cl,[data-theme="dark"] tr.ctog-inc td.cd{background:rgba(34,197,94,0.18)!important}
[data-theme="dark"] tr.ctog-fix td{background:rgba(99,102,241,0.22)}
[data-theme="dark"] tr.ctog-fix td.cl,[data-theme="dark"] tr.ctog-fix td.cd{background:rgba(99,102,241,0.22)!important}
[data-theme="dark"] tr.ctog-var td{background:rgba(99,102,241,0.22)}
[data-theme="dark"] tr.ctog-var td.cl,[data-theme="dark"] tr.ctog-var td.cd{background:rgba(99,102,241,0.22)!important}
[data-theme="dark"] tr.ctog-acc td{background:rgba(15,16,28,0.85)}
[data-theme="dark"] tr.ctog-acc td.cl,[data-theme="dark"] tr.ctog-acc td.cd{background:rgba(15,16,28,0.85)!important}
[data-theme="dark"] tr.ctog-sav td{background:rgba(139,92,246,0.22)}
[data-theme="dark"] tr.ctog-sav td.cl,[data-theme="dark"] tr.ctog-sav td.cd{background:rgba(139,92,246,0.22)!important}
[data-theme="dark"] tr.ctog-dbt td{background:rgba(239,68,68,0.18)}
[data-theme="dark"] tr.ctog-dbt td.cl,[data-theme="dark"] tr.ctog-dbt td.cd{background:rgba(239,68,68,0.18)!important}
[data-theme="dark"] tr.ctog-goals td{background:rgba(16,185,129,0.18)}
[data-theme="dark"] tr.ctog-goals td.cl,[data-theme="dark"] tr.ctog-goals td.cd{background:rgba(16,185,129,0.18)!important}

.sec-inner{display:flex;align-items:center;gap:8px}
.sec-lbl{flex:1}
/* compact chevron toggle */
.sec-toggle-circle{width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,.15);
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:9px;color:#fff;transition:all .15s;cursor:pointer;line-height:1}
.sec-toggle-circle:hover{background:rgba(255,255,255,.3)}
/* compact + add button */
.sec-add{display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:3px;
  background:rgba(255,255,255,.12);color:#fff;cursor:pointer;
  font-size:13px;line-height:1;opacity:0;transition:opacity .15s;flex-shrink:0}
tr.ctog:hover .sec-add{opacity:1}
.sec-add:hover{background:rgba(255,255,255,.28)}

/* ═══ DATA ROWS ════════════════════════════════════════ */
/* uniform font size and no colored backgrounds — only colored text */
tr td,tr th{font-size:13px}
tr.r-inc .cl{color:var(--income);font-weight:500}
tr.r-ti td{color:var(--income);font-weight:700;border-top:1px solid var(--border2)}
tr.r-te td{color:var(--expense);font-weight:700;border-top:1px solid var(--border2)}
tr.r-net td{font-weight:600;background:#f1f5f9;color:var(--text);border-top:2px solid var(--border2)}
[data-theme="dark"] tr.r-net td{background:rgba(255,255,255,0.03)}
/* balance — cyan glow */
tr.r-bal td{color:#06B6D4;font-weight:800;font-size:15px;border-top:2px solid var(--border2)}
tr.r-bal .cl{color:#06B6D4}
[data-theme="dark"] tr.r-bal td{color:#06B6D4;background:rgba(6,182,212,0.05)}
[data-theme="dark"] tr.r-bal .cl{color:#06B6D4;background:rgba(6,182,212,0.05)!important}
tr.r-tat td{font-weight:600;color:var(--accent)}
tr.r-tsa td{font-weight:600;color:var(--savings)}
tr.r-tdt td{font-weight:600;color:var(--debt-c)}
tr.r-tgoals td{font-weight:600;color:var(--goal-cl)}
tr.r-sp td{height:4px;background:var(--bg);border:none}
tr.r-goal .cl{color:var(--goal-cl);font-weight:500}

/* anchor col */
td.yr-anc{background:var(--yr-hid-bg);border-right:1px solid var(--border)}
th.yr-anc-mo{background:var(--yr-hid-bg)}
td.cur{background:var(--cur-col)!important}

/* debt status */
td.debt-close{background:var(--dc-bg)!important;outline:1px solid var(--dc-brd)}
td.debt-past{background:var(--dp-bg)!important;color:var(--dp-txt)}
td.debt-past *{color:var(--dp-txt)!important;pointer-events:none}

/* heatmap bar */
.heat-bar{width:5px;min-width:5px;height:18px;border-radius:3px;flex-shrink:0;margin-right:8px;align-self:center;opacity:.85}

/* label cell */
.lbl-wrap{display:flex;align-items:center;gap:4px;min-width:0}
.drag-handle{color:var(--muted);font-size:12px;cursor:grab;opacity:0;flex-shrink:0;padding:0 2px;user-select:none}
tr:hover .drag-handle{opacity:.4}
.drag-handle:hover{opacity:1!important}
tr.dragging{opacity:.35}
tr.drag-over{outline:2px solid var(--accent)}
.lbl-txt{flex:1;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.lbl-txt:hover{color:var(--accent)}
.del-btn{display:none;background:none;border:none;color:var(--neg);cursor:pointer;padding:0 2px;font-size:15px;opacity:.5;flex-shrink:0}
.del-btn:hover{opacity:1}
tr:hover .del-btn{display:inline}

/* placeholder & inline-add row */
tr.r-placeholder td{border-bottom:none;padding:4px 0}
.add-placeholder-btn{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:12px;padding:5px 14px;opacity:.55;display:flex;align-items:center;gap:6px}
.add-placeholder-btn:hover{opacity:1;color:var(--accent)}
tr.r-editing td{background:var(--inp-f)}
.inline-name-input{background:transparent;border:none;border-bottom:1.5px solid var(--accent);
  color:var(--text);font-size:13px;font-family:inherit;padding:2px 4px;
  width:100%;outline:none;min-width:120px}
.inline-hint{font-size:10px;color:var(--muted);margin-left:8px;white-space:nowrap}

/* inputs */
input.val{background:transparent;border:none;color:inherit;text-align:right;width:100%;
          font-size:12.5px;font-family:inherit;padding:2px 0;-moz-appearance:textfield}
input.val::-webkit-inner-spin-button,input.val::-webkit-outer-spin-button{display:none}
input.val:hover{background:var(--inp-h);border-radius:3px}
input.val:focus{outline:1px solid var(--accent);background:var(--inp-f);border-radius:3px}
input.date-pick{background:transparent;border:none;color:var(--muted);font-size:10px;
                font-family:inherit;width:100%;text-align:center;cursor:pointer;padding:0;color-scheme:light dark}
input.date-pick:focus{outline:1px solid var(--accent);border-radius:3px}
.pos{color:var(--pos)} .neg{color:var(--neg)} .zero{color:var(--muted)}

/* ═══ GOALS TAB ═════════════════════════════════════════ */
.goals-wrap{flex:1;overflow-y:auto;padding:24px}
.goals-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.goals-header h2{font-size:20px;font-weight:700;flex:1}
.btn-primary{padding:9px 18px;border-radius:8px;border:none;background:var(--goal-cl);color:#fff;
             cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.goal-form{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;
           padding:20px;margin-bottom:20px;box-shadow:var(--shadow);display:none}
.goal-form.open{display:block}
.goal-form h3{font-size:14px;font-weight:700;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-field input{padding:8px 10px;border:1px solid var(--border2);border-radius:6px;
                  background:var(--s2);color:var(--text);font-size:13px;font-family:inherit}
.form-field input:focus{outline:1px solid var(--accent);border-color:var(--accent)}
.form-actions{display:flex;gap:8px}
.btn-cancel{padding:8px 16px;border-radius:6px;border:1px solid var(--border2);background:transparent;
            color:var(--muted);cursor:pointer;font-size:12px}
.btn-cancel:hover{background:var(--sb-hover)}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.goal-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;
           padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.goal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--goal-grad)}
.goal-card-name{font-size:15px;font-weight:700;margin-bottom:8px}
.goal-card-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.goal-meta-item{background:var(--s2);border-radius:6px;padding:8px 10px}
.goal-meta-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.goal-meta-value{font-size:14px;font-weight:700}
.goal-meta-value.green{color:var(--goal-cl)}
.goal-progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.goal-progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.goal-progress-fill{height:6px;background:var(--goal-grad);border-radius:3px;transition:width .3s}
.goal-del{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;
          border:none;background:var(--border);color:var(--muted);cursor:pointer;font-size:14px;
          display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.goal-card:hover .goal-del{opacity:1}
.goal-del:hover{background:var(--neg);color:#fff}
.goals-empty{text-align:center;padding:48px 24px;color:var(--muted)}
.goals-empty .goals-icon{font-size:48px;margin-bottom:12px}
.goals-empty p{font-size:14px}

/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM OVERRIDE — matches CashKat standalone
═══════════════════════════════════════════════════ */

/* Fonts */
body{font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#0B0C15}
input,button{font-family:'Manrope',system-ui,sans-serif}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.16);background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}

/* ── RAIL (sidebar) ── */
.sidebar{
  width:76px!important;flex:0 0 76px;
  background:linear-gradient(180deg,#10111B,#0C0D16)!important;
  border-right:1px solid rgba(255,255,255,0.06)!important;
  backdrop-filter:none;-webkit-backdrop-filter:none;
  box-shadow:none!important;
}
.sb-logo{
  padding:16px 0!important;justify-content:center;
  border-bottom:1px solid rgba(255,255,255,0.06)!important;
}
.sb-logo-icon{
  width:44px;height:44px;border-radius:14px;
  display:grid;place-items:center;font-size:22px;line-height:1;
  background:linear-gradient(145deg,#8B5CF6,#6D28D9);
  box-shadow:0 8px 24px rgba(139,92,246,0.40),inset 0 1px 0 rgba(255,255,255,0.25);
}
.sb-nav{padding:18px 0!important;gap:8px!important;width:100%;align-items:center}
.nav-item{
  width:48px!important;height:48px!important;border-radius:15px!important;
  font-size:21px!important;opacity:.4;
  transition:opacity .2s,background .2s,transform .15s!important;
  border:1px solid transparent!important;
  background:transparent!important;
}
.nav-item:hover{opacity:.85!important;background:rgba(255,255,255,0.04)!important}
.nav-item.active{
  opacity:1!important;
  background:linear-gradient(145deg,rgba(139,92,246,0.20),rgba(139,92,246,0.06))!important;
  border-color:rgba(139,92,246,0.30)!important;
}
.nav-item.active::before{
  content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);
  width:4px;height:24px;border-radius:4px;background:#8B5CF6;
  box-shadow:0 0 12px #8B5CF6;
}
/* tooltip from CSS ::after — override with the span.tip approach */
.nav-item[title]:hover::after{display:none}
.nav-item .tip{
  position:absolute;left:62px;top:50%;transform:translateY(-50%) translateX(-6px);
  background:#22243A;color:#EDEEF5;font-size:13px;font-weight:600;
  padding:7px 12px;border-radius:9px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .16s,transform .16s;z-index:30;
  border:1px solid rgba(255,255,255,0.06);box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.nav-item .tip::before{
  content:'';position:absolute;left:-5px;top:50%;transform:translateY(-50%) rotate(45deg);
  width:9px;height:9px;background:#22243A;
  border-left:1px solid rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.06);
}
.nav-item:hover .tip{opacity:1!important;transform:translateY(-50%) translateX(0)!important}

/* avatar / signout */
.sb-bottom{padding:14px 0!important;align-items:center;border-top:1px solid rgba(255,255,255,0.06)!important}
.sb-avatar{width:40px;height:40px;border-radius:12px!important;border:none!important;object-fit:cover}
.sb-signout{
  width:48px!important;height:48px!important;border-radius:15px!important;
  font-size:18px!important;padding:0!important;justify-content:center;
  opacity:.4;transition:opacity .2s,background .2s;
}
.sb-signout:hover{opacity:.85!important;background:rgba(255,255,255,0.04)!important;color:inherit!important}

/* ── MAIN STAGE ── */
.main{background:transparent!important}
.tab-content.active{display:flex;flex-direction:column}
.wrap{padding:0!important}
/* glow re-position inside main */
.bg-glows{z-index:0}

/* ── THEAD YEAR ROW → pill-style tabs ── */
thead tr.yr-row th{
  background:#0B0C15!important;
  border-bottom:1px solid rgba(255,255,255,0.06)!important;
  height:52px!important;line-height:1!important;padding:10px 8px!important;
}
thead tr.yr-row th[data-yr]{
  font-family:'JetBrains Mono',monospace!important;
  font-size:13.5px!important;font-weight:600!important;

  background:#0B0C15!important;
  cursor:pointer;transition:.16s;
  border:none!important;
}
thead tr.yr-row th[data-yr]:hover{color:#EDEEF5!important}
/* active year — highlight the current year */
thead tr.yr-row th.yr-cur-active{
  color:#fff!important;
  background:linear-gradient(145deg,rgba(139,92,246,0.28),rgba(139,92,246,0.10))!important;

  border-radius:9px!important;
}
thead tr.yr-row th.yr-collapsed{
  font-size:11px!important;font-weight:600!important;

  background:#0B0C15!important;
}
thead tr.yr-row th.cl,thead tr.yr-row th.cd{
  background:#0B0C15!important;color:rgba(237,238,245,0.34)!important;

  text-transform:uppercase;letter-spacing:.7px;
}

/* ── THEAD MONTH ROW ── */
thead tr.mo-row th{
  background:#0B0C15!important;
  color:rgba(237,238,245,0.45)!important;
  font-size:12.5px!important;font-weight:600!important;
  padding:8px 18px 12px!important;
  border-bottom:1px solid rgba(255,255,255,0.06)!important;
}
thead tr.mo-row th.cur{
  color:#06B6D4!important;
  position:relative;
}
thead tr.mo-row th.cur::after{
  content:'';display:block;height:2px;border-radius:2px;
  background:#06B6D4;box-shadow:0 0 8px #06B6D4;margin-top:5px;
}
thead tr.mo-row th.cl,thead tr.mo-row th.cd{
  background:#0B0C15!important;
}
thead tr.mo-row th.mo-hid{background:rgba(255,255,255,0.02)!important}
th.yr-anc-mo{background:rgba(255,255,255,0.02)!important}

/* ── TABLE BASE ── */
table{background:#0B0C15!important}
th,td{border-color:rgba(255,255,255,0.04)!important}
tbody td{font-size:13.5px;height:42px;border-bottom:1px solid rgba(255,255,255,0.04)!important}

/* ── STICKY LABEL COLUMN ── */
.cl{
  background:#151621!important;
  border-right:1px solid rgba(255,255,255,0.06)!important;
  font-size:13.5px!important;
  min-width:240px;
}
.cd{
  background:#151621!important;
  border-right:1px solid rgba(255,255,255,0.06)!important;
  font-size:11px!important;color:rgba(237,238,245,0.34)!important;
  width:40px;min-width:40px;
}

/* ── DATA ROW labels ── */
.lbl-wrap{gap:10px!important}
.heat-bar{
  width:3px!important;min-width:3px!important;height:18px;
  border-radius:3px;flex-shrink:0;margin-right:0!important;
}
.lbl-txt{font-size:13.5px!important;color:#EDEEF5!important}
tr.r-inc .cl .lbl-txt{color:#EDEEF5!important}
.drag-handle{color:rgba(237,238,245,0.2)!important}
.del-btn{color:#EF4444!important}

/* value cells — monospace */
td:not(.cl):not(.cd){
  font-family:'JetBrains Mono',monospace!important;
  font-size:13px!important;color:#EDEEF5!important;
}
input.val{
  font-family:'JetBrains Mono',monospace!important;
  font-size:13px!important;color:#EDEEF5!important;
}

/* hover on data rows */
tr.r-inc:hover td,tr.r-exp:hover td,tr.r-acc:hover td,tr.r-sav:hover td,tr.r-dbt:hover td,tr.r-goal:hover td{
  background:rgba(255,255,255,0.025)!important;
}
tr.r-inc:hover td.cl,tr.r-exp:hover td.cl,tr.r-acc:hover td.cl,tr.r-goal:hover td.cl{background:#1A1B28!important}

/* ── SECTION HEADERS (ctog) ── */
tr.ctog td{
  height:46px!important;font-size:12px!important;font-weight:800!important;
  letter-spacing:.9px!important;text-transform:uppercase!important;
  border-bottom:1px solid rgba(255,255,255,0.06)!important;
  border-top:none!important;
  padding:0 16px!important;
  color:#EDEEF5!important;
}
tr.ctog td.cl{text-align:left!important;padding:0 16px!important}
tr.ctog:hover td{filter:none!important}
tr.ctog-inc td,tr.ctog-inc td.cl,tr.ctog-inc td.cd{background:#151621!important}
tr.ctog-fix td,tr.ctog-fix td.cl,tr.ctog-fix td.cd,
tr.ctog-var td,tr.ctog-var td.cl,tr.ctog-var td.cd{background:#191B28!important}
tr.ctog-acc td,tr.ctog-acc td.cl,tr.ctog-acc td.cd{background:#0F1019!important}
tr.ctog-sav td,tr.ctog-sav td.cl,tr.ctog-sav td.cd{background:#191B28!important}
tr.ctog-dbt td,tr.ctog-dbt td.cl,tr.ctog-dbt td.cd{background:#191B28!important}
tr.ctog-goals td,tr.ctog-goals td.cl,tr.ctog-goals td.cd{background:#151621!important}

/* sec-inner redesign — matches design chevron + dot */
.sec-inner{gap:10px!important;align-items:center!important}
.sec-toggle-circle{

}

}
.sec-lbl{font-size:12px!important;font-weight:800!important;letter-spacing:.9px!important;color:#EDEEF5!important}
.sec-add{
  background:rgba(255,255,255,0.08)!important;width:16px!important;height:16px!important;
  border-radius:4px!important;font-size:14px!important;display:inline-flex!important;
  align-items:center!important;justify-content:center!important;
}
.sec-add:hover{background:rgba(255,255,255,0.2)!important}

/* ── PARENT HEADING (РАСХОДЫ) ── */
tr.r-hdg-exp td,tr.r-hdg-exp td.cl,tr.r-hdg-exp td.cd{

}

tr.r-ti td,tr.r-ti .cl{font-weight:700!important;color:#22C55E!important;font-size:13.5px!important;border-top:1px solid rgba(255,255,255,0.06)!important}

tr.r-tat td,tr.r-tat .cl{font-weight:700!important;color:#06B6D4!important}
tr.r-tsa td,tr.r-tsa .cl{font-weight:700!important;color:#8B5CF6!important}
tr.r-tdt td,tr.r-tdt .cl{font-weight:700!important;color:#F5A524!important}

/* ── NET ROW ── */
tr.r-net td,tr.r-net td.cl{

  color:#EDEEF5!important;font-weight:600!important;
  border-top:1px solid rgba(255,255,255,0.08)!important;
  font-size:13px!important;
}
tr.r-net .cl .lbl-txt{color:rgba(237,238,245,0.7)!important}

/* ── BALANCE ROW ── */
tr.r-bal td{

  color:#06B6D4!important;font-weight:800!important;font-size:15px!important;
  border-top:1px solid rgba(6,182,212,0.2)!important;
  font-family:'JetBrains Mono',monospace!important;
}

  color:#06B6D4!important;
}
tr.r-bal td.cl .lbl-txt{color:#06B6D4!important;font-weight:700!important;font-family:'Manrope',sans-serif!important}

/* ── SPACER ROWS ── */
tr.r-sp td{height:14px!important;background:transparent!important;border:none!important}

/* ── CURRENT MONTH COLUMN ── */
td.cur{background:rgba(6,182,212,0.05)!important}
tr.r-bal td.cur{background:rgba(6,182,212,0.10)!important}

/* ── YEAR ANCHOR CELLS ── */
td.yr-anc{background:rgba(255,255,255,0.02)!important}

/* ── PLACEHOLDER / ADD ROW ── */
.add-placeholder-btn{color:rgba(237,238,245,0.35)!important;font-size:12px!important}
.add-placeholder-btn:hover{color:#8B5CF6!important}
tr.r-editing td{background:rgba(139,92,246,0.06)!important}
.inline-name-input{border-bottom-color:#8B5CF6!important;color:#EDEEF5!important}
.inline-hint{color:rgba(237,238,245,0.3)!important}

/* ── GOALS TAB ── */
.goals-wrap{background:transparent!important}
.goal-card{background:linear-gradient(160deg,rgba(255,255,255,0.045),rgba(255,255,255,0.012))!important;border-color:rgba(255,255,255,0.06)!important;border-radius:16px!important;backdrop-filter:blur(12px)}
.goal-card::before{background:var(--goal-grad)!important}
.goal-meta-item{background:rgba(255,255,255,0.04)!important}
.btn-primary{background:linear-gradient(145deg,#8B5CF6,#6D28D9)!important;border-radius:10px!important}
.btn-cancel{border-color:rgba(255,255,255,0.1)!important;color:rgba(237,238,245,0.5)!important}
.form-field input{background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.08)!important;color:#EDEEF5!important}

/* ── POSITIVE / NEGATIVE ── */
.pos{color:#22C55E!important}.neg{color:#EF4444!important}.zero{color:rgba(237,238,245,0.3)!important}
</style>
</head>

// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const SY=2026,SM=4; // May 2026
const YEARS=[{y:2026,start:0,len:8},{y:2027,start:8,len:12},{y:2028,start:20,len:12},{y:2029,start:32,len:12},{y:2030,start:44,len:12}];
const NM=56;
const MON_FULL=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MON_SHORT=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
function colDate(m){return new Date(SY,SM+m,1)}
function colYear(m){return colDate(m).getFullYear()}
function colMon(m){return colDate(m).getMonth()}
function colLabel(m){return MON_FULL[colMon(m)]}
const NOW=new Date();
const CUR=(()=>{for(let i=0;i<NM;i++){const d=colDate(i);if(d.getFullYear()===NOW.getFullYear()&&d.getMonth()===NOW.getMonth())return i}return -1})();
const CUR_YEAR=NOW.getFullYear();
const INS_BEFORE={sec_inc:'tot_inc',sec_fix:'tot_fix',sec_var:'tot_var',sec_acc:'tot_acc',sec_sav:'tot_sav',sec_dbt:'tot_dbt',sec_goals:'tot_goals'};

// ═══════════════════════════════════════════════════
//  DEFAULT ROWS  (пустой скелет — данные хранятся в Firestore по uid)
// ═══════════════════════════════════════════════════
const ROWS_DEF=[
  {id:'sec_inc',   tp:'ctog',    sk:'inc',   cl:'inc',   label:'ДОХОДЫ',                   at:'income'},
  {id:'tot_inc',   tp:'tot_inc', label:'ИТОГО ДОХОДЫ'},

  {id:'sec_exp',   tp:'hdg',                 cl:'exp',   label:'РАСХОДЫ'},
  {id:'sec_fix',   tp:'ctog',    sk:'fix',   cl:'fix',   label:'ОБЯЗАТЕЛЬНЫЕ',             at:'expense'},
  {id:'tot_fix',   tp:'tot_fix', label:'Итого обязательные'},

  {id:'sec_var',   tp:'ctog',    sk:'var',   cl:'var',   label:'ПЕРЕМЕННЫЕ',               at:'expense'},
  {id:'tot_var',   tp:'tot_var', label:'Итого переменные'},

  {id:'sec_goals', tp:'ctog',    sk:'goals', cl:'goals', label:'ЦЕЛИ',                    at:'goal'},
  {id:'tot_goals', tp:'tot_goals',label:'Итого цели'},

  {id:'tot_exp',   tp:'tot_exp', label:'ИТОГО РАСХОДЫ'},
  {id:'net',       tp:'net',     label:'За месяц (доходы − расходы)'},
  {id:'balance',   tp:'balance', label:'БАЛАНС накопленным итогом'},

  {id:'sp1',       tp:'spacer'},
  {id:'sec_acc',   tp:'ctog',    sk:'acc',   cl:'acc',   label:'ФАКТ — СЧЕТА',             at:'account'},
  {id:'tot_acc',   tp:'tot_acc', label:'Итого по счетам'},

  {id:'sp2',       tp:'spacer'},
  {id:'sec_sav',   tp:'ctog',    sk:'sav',   cl:'sav',   label:'СБЕРЕЖЕНИЯ',               at:'savings'},
  {id:'tot_sav',   tp:'tot_sav', label:'Итого сбережения'},

  {id:'sp3',       tp:'spacer'},
  {id:'sec_dbt',   tp:'ctog',    sk:'dbt',   cl:'dbt',   label:'КРЕДИТЫ (остаток долга)',  at:'debt'},
  {id:'tot_dbt',   tp:'tot_dbt', label:'Итого долгов'},
];

const DEF_CLOSE_DATES={};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const ET=['income','expense','account','savings','debt','goal'];
const DEF_SECT={inc:true,fix:true,var:true,acc:true,sav:false,dbt:false,goals:true};
const DEF_YRS_HID=new Set(YEARS.map(y=>y.y).filter(y=>y!==CUR_YEAR));
// All months of current year are visible by default — no individual months hidden
const DEF_MON_HID=new Set();

let rows,plan,sectOpen,hiddenMonths,hiddenYears,closeDates,colWidths,goals;

function initState(){
  rows=JSON.parse(JSON.stringify(ROWS_DEF));
  plan=buildPlan(rows);
  sectOpen={...DEF_SECT};
  hiddenMonths=new Set([...DEF_MON_HID]);
  hiddenYears=new Set([...DEF_YRS_HID]);
  closeDates={...DEF_CLOSE_DATES};
  colWidths={};
  goals=[];
}

function buildPlan(ra){
  const p={};
  ra.forEach(r=>{if(ET.includes(r.tp))p[r.id]=Array.from({length:NM},()=>r.def??0)});
  return p;
}

function backfill(){
  rows.forEach(r=>{
    if(!ET.includes(r.tp))return;
    if(!plan[r.id])plan[r.id]=Array.from({length:NM},()=>r.def??0);
    while(plan[r.id].length<NM)plan[r.id].push(r.def??0);
  });
}

// ─── PERSISTENCE ──────────────────────────────────
const LS='cashkat_v4';
let saveTimer=null;

function packState(){return{rows,plan,sectOpen,hiddenMonths:[...hiddenMonths],hiddenYears:[...hiddenYears],closeDates,colWidths,goals}}

function unpackState(d){
  rows=d.rows||JSON.parse(JSON.stringify(ROWS_DEF));
  // Migration: inject sec_exp (РАСХОДЫ parent heading) if missing
  if(!rows.find(r=>r.id==='sec_exp')){
    const fi=rows.findIndex(r=>r.id==='sec_fix');
    if(fi>=0)rows.splice(fi,0,{id:'sec_exp',tp:'hdg',cl:'exp',label:'РАСХОДЫ'});
  }
  // Migration: shorten sub-section labels
  rows.forEach(r=>{
    if(r.id==='sec_fix'&&r.label==='ОБЯЗАТЕЛЬНЫЕ РАСХОДЫ')r.label='ОБЯЗАТЕЛЬНЫЕ';
    if(r.id==='sec_var'&&r.label==='ПЕРЕМЕННЫЕ РАСХОДЫ')r.label='ПЕРЕМЕННЫЕ';
  });
  plan=d.plan||buildPlan(rows);
  sectOpen=Object.assign({},DEF_SECT,d.sectOpen||{});
  hiddenMonths=new Set(d.hiddenMonths||[...DEF_MON_HID]);
  hiddenYears=new Set(d.hiddenYears||[...DEF_YRS_HID]);
  closeDates=Object.assign({},DEF_CLOSE_DATES,d.closeDates||{});
  colWidths=d.colWidths||{};
  goals=d.goals||[];
  backfill();
}

function loadLocal(){try{const s=localStorage.getItem(LS);if(s)unpackState(JSON.parse(s));else initState()}catch{initState()}}

async function loadFirestore(){
  try{const snap=await db.collection('users').doc(currentUser.uid).collection('data').doc('main').get();
    if(snap.exists)unpackState(snap.data());else initState()}catch{initState()}}

function save(){
  const p=packState();
  if(IS_DEV){localStorage.setItem(LS,JSON.stringify(p));flashSave();return}
  if(!currentUser)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await db.collection('users').doc(currentUser.uid).collection('data').doc('main').set({...p,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});flashSave()}catch(e){console.error(e)}
  },800);
}

function flashSave(){const el=$('save-ind');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)}

// ═══════════════════════════════════════════════════
//  CALCULATIONS
// ═══════════════════════════════════════════════════
const st=(tp,m)=>rows.filter(r=>r.tp===tp).reduce((s,r)=>s+(plan[r.id]?.[m]??0),0);
const stSec=(sec,m)=>rows.filter(r=>(r.tp==='expense'||r.tp==='goal')&&(r.sec===sec||r.section===sec)).reduce((s,r)=>s+(plan[r.id]?.[m]??0),0);
const totInc=m=>st('income',m);
const totGoals=m=>st('goal',m);
const totExp=m=>st('expense',m)+totGoals(m);
const totAcc=m=>st('account',m);
const totSav=m=>st('savings',m);
const totDbt=m=>st('debt',m);
const totFix=m=>stSec('sec_fix',m);
const totVar=m=>stSec('sec_var',m);
const cumBal=m=>{let b=0;for(let i=0;i<=m;i++)b+=totInc(i)-totExp(i);return b};

// ═══════════════════════════════════════════════════
//  DEBT STATUS
// ═══════════════════════════════════════════════════
function debtSt(rowId,m){
  const ds=closeDates[rowId];if(!ds)return 'normal';
  const cd=new Date(ds+'T00:00:00');
  const cm=new Date(cd.getFullYear(),cd.getMonth(),1);
  const dm=colDate(m);
  if(+dm<+cm)return 'normal';if(+dm===+cm)return 'close';return 'past';
}

// ═══════════════════════════════════════════════════
//  FORMAT
// ═══════════════════════════════════════════════════
const fmt=n=>Math.round(n).toLocaleString('ru-RU');
const parse=s=>parseFloat(String(s).replace(/\s/g,'').replace(',','.'))||0;
const cc=n=>n>0?'pos':n<0?'neg':'zero';
const vis=m=>!hiddenMonths.has(m)&&!hiddenYears.has(colYear(m));

// ═══════════════════════════════════════════════════
//  GOALS LOGIC
// ═══════════════════════════════════════════════════
function calcGoalMonthly(targetAmount,targetDate){
  const target=new Date(targetDate+'-01');
  const nowY=NOW.getFullYear(),nowMo=NOW.getMonth();
  const months=Math.max(1,(target.getFullYear()-nowY)*12+(target.getMonth()-nowMo));
  return Math.ceil(targetAmount/months);
}

function goalMonthIdx(targetDate){
  const d=new Date(targetDate+'-01');
  for(let m=0;m<NM;m++){const md=colDate(m);if(md.getFullYear()===d.getFullYear()&&md.getMonth()===d.getMonth())return m}
  return NM-1;
}

function applyGoalToRows(goal){
  // ensure goals section exists in rows before tot_goals
  if(!rows.find(r=>r.id===goal.id)){
    const bi=rows.findIndex(r=>r.id==='tot_goals');
    const nr={id:goal.id,tp:'goal',label:goal.name,day:null,def:goal.monthly,sec:'sec_goals'};
    if(bi>=0)rows.splice(bi,0,nr);else rows.push(nr);
  }
  // fill plan: from current month up to (but NOT including) the target month
  const monthly=goal.monthly;
  const start=CUR>=0?CUR:0;
  const end=Math.max(start,goalMonthIdx(goal.targetDate)-1);
  if(!plan[goal.id])plan[goal.id]=new Array(NM).fill(0);
  for(let m=0;m<NM;m++)plan[goal.id][m]=(m>=start&&m<=end)?monthly:0;
}

function addGoal(){
  const name=$('g-name').value.trim();
  const amount=parseFloat($('g-amount').value)||0;
  const date=$('g-date').value;
  if(!name||!amount||!date){alert('Заполни все поля');return}
  const monthly=calcGoalMonthly(amount,date);
  const goal={id:'goal_'+Date.now(),name,targetAmount:amount,targetDate:date,monthly};
  goals.push(goal);
  applyGoalToRows(goal);
  $('g-name').value='';$('g-amount').value='';$('g-date').value='';
  toggleGoalForm();
  save();render();renderGoals();
}

function deleteGoal(id){
  if(!confirm('Удалить цель?'))return;
  goals=goals.filter(g=>g.id!==id);
  const ri=rows.findIndex(r=>r.id===id);
  if(ri>=0)rows.splice(ri,1);
  delete plan[id];
  save();render();renderGoals();
}

function toggleGoalForm(){$('goal-form').classList.toggle('open')}

// ═══════════════════════════════════════════════════
//  USER ACTIONS (table)
// ═══════════════════════════════════════════════════
function editLabel(id){const r=rows.find(x=>x.id===id);if(!r)return;const n=prompt('Новое название:',r.label);if(n===null)return;r.label=n.trim()||r.label;save();render()}
function deleteRow(id){if(!confirm('Удалить?'))return;const i=rows.findIndex(x=>x.id===id);if(i<0)return;rows.splice(i,1);delete plan[id];save();render()}

// ── Inline row add ──────────────────────────────────
let addingTo=null;
function startAddRow(secId){
  const sk=rows.find(r=>r.id===secId)?.sk;
  if(sk&&!sectOpen[sk])sectOpen[sk]=true;
  addingTo=secId;render();
  setTimeout(()=>{const inp=document.getElementById('new-row-inp');if(inp)inp.focus();},0);
}
function confirmAddRow(secId){
  const inp=document.getElementById('new-row-inp');
  const name=(inp?inp.value:'').trim();
  addingTo=null;
  if(!name){render();return;}
  const sec=rows.find(x=>x.id===secId);if(!sec)return;
  const bi=rows.findIndex(x=>x.id===INS_BEFORE[secId]);
  const nr={id:'r'+Date.now(),tp:sec.at,label:name,day:null,def:0,sec:secId};
  if(bi>=0)rows.splice(bi,0,nr);else rows.push(nr);
  plan[nr.id]=new Array(NM).fill(0);
  save();render();
}
function cancelAddRow(){addingTo=null;render();}
function toggleSec(sk){sectOpen[sk]=!sectOpen[sk];save();render()}
function toggleMonth(m){hiddenMonths.has(m)?hiddenMonths.delete(m):hiddenMonths.add(m);save();render()}
function toggleYear(y){hiddenYears.has(y)?hiddenYears.delete(y):hiddenYears.add(y);save();render()}

// ═══════════════════════════════════════════════════
//  COLGROUP
// ═══════════════════════════════════════════════════
function buildColgroup(){
  const cg=$('colgroup');cg.innerHTML='';
  const cl=document.createElement('col');cl.style.width='210px';cg.appendChild(cl);
  const cd=document.createElement('col');cd.style.width='50px';cg.appendChild(cd);
  YEARS.forEach(yr=>{
    const anc=document.createElement('col');anc.id='anc-'+yr.y;anc.style.width='50px';cg.appendChild(anc);
    for(let m=yr.start;m<yr.start+yr.len;m++){
      const mc=document.createElement('col');mc.id='mc-'+m;
      if(!hiddenYears.has(yr.y)){
        mc.style.width=(hiddenMonths.has(m)?20:(colWidths[m]||90))+'px';
      }
      cg.appendChild(mc);
    }
  });
}

function updateColVis(){
  YEARS.forEach(yr=>{
    const anc=$('anc-'+yr.y);const hid=hiddenYears.has(yr.y);
    if(anc){anc.style.visibility=hid?'':'collapse';anc.style.width=hid?'50px':'0'}
    for(let m=yr.start;m<yr.start+yr.len;m++){
      const mc=$('mc-'+m);if(mc){
        if(hid){mc.style.visibility='collapse';}
        else{mc.style.visibility='';mc.style.width=hiddenMonths.has(m)?'20px':(colWidths[m]?colWidths[m]+'px':'');}
      }
    }
  });
  document.querySelectorAll('th[data-yr]').forEach(th=>{
    const y=parseInt(th.dataset.yr);const hid=hiddenYears.has(y);
    th.textContent=y+'';th.classList.toggle('yr-collapsed',hid);th.title=hid?`Развернуть ${y}`:`Свернуть ${y}`;
  });
}

// ═══════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════
let resizing=null;
function startResize(e,m){e.preventDefault();e.stopPropagation();const mc=$('mc-'+m);const startX=e.clientX;const startW=mc?parseInt(mc.style.width)||90:90;resizing={m,startX,startW};document.addEventListener('mousemove',onResize);document.addEventListener('mouseup',endResize)}
function onResize(e){if(!resizing)return;const w=Math.max(60,resizing.startW+(e.clientX-resizing.startX));const mc=$('mc-'+resizing.m);if(mc)mc.style.width=w+'px';colWidths[resizing.m]=w}
function endResize(){resizing=null;document.removeEventListener('mousemove',onResize);document.removeEventListener('mouseup',endResize);save()}

// ═══════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════
let dragId=null,dragSec=null;
function onDragStart(e,id,sec){dragId=id;dragSec=sec;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function onDragOver(e,id,sec){if(sec!==dragSec||id===dragId)return;e.preventDefault();document.querySelectorAll('tr.drag-over').forEach(el=>el.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over')}
function onDrop(e,id,sec){e.preventDefault();document.querySelectorAll('tr.drag-over').forEach(el=>el.classList.remove('drag-over'));if(sec!==dragSec||id===dragId)return;const fi=rows.findIndex(x=>x.id===dragId);const ti=rows.findIndex(x=>x.id===id);if(fi<0||ti<0)return;const[m]=rows.splice(fi,1);rows.splice(ti,0,m);save();render()}
function onDragEnd(){dragId=null;dragSec=null;document.querySelectorAll('tr.dragging,tr.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'))}

// ═══════════════════════════════════════════════════
function makeInput(rowId,mi){
  const inp=document.createElement('input');inp.type='text';inp.className='val';
  inp.value=fmt(plan[rowId]?.[mi]??0);
  inp.addEventListener('focus',function(){this.value=plan[rowId]?.[mi]??0;this.select()});
  inp.addEventListener('blur',function(){const v=parse(this.value);if(!plan[rowId])plan[rowId]=new Array(NM).fill(0);for(let m=mi;m<NM;m++)plan[rowId][m]=v;save();render()});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')e.target.blur()});
  return inp;
}

// ═══════════════════════════════════════════════════
//  RENDER TABLE
// ═══════════════════════════════════════════════════
function render(){
  buildColgroup();
  const thead=$('thead');thead.innerHTML='';

  // year row
  const yrTr=document.createElement('tr');yrTr.className='yr-row';
  const yrL=document.createElement('th');yrL.className='cl';yrL.rowSpan=2;yrTr.appendChild(yrL);
  const yrD=document.createElement('th');yrD.className='cd';yrD.rowSpan=2;yrD.textContent='День';yrTr.appendChild(yrD);
  YEARS.forEach(yr=>{
    const hid=hiddenYears.has(yr.y);const th=document.createElement('th');
    th.colSpan=yr.len+1;th.dataset.yr=yr.y;th.textContent=yr.y+'';
    th.title=hid?`Развернуть ${yr.y}`:`Свернуть ${yr.y}`;th.onclick=()=>toggleYear(yr.y);
    if(hid)th.classList.add('yr-collapsed');
    if(yr.y===CUR_YEAR&&!hid)th.classList.add('yr-cur-active');
    yrTr.appendChild(th);
  });
  thead.appendChild(yrTr);

  // month row
  const moTr=document.createElement('tr');moTr.className='mo-row';
  YEARS.forEach(yr=>{
    const ancTh=document.createElement('th');ancTh.className='yr-anc-mo';moTr.appendChild(ancTh);
    for(let m=yr.start;m<yr.start+yr.len;m++){
      const th=document.createElement('th');
      const isHid=hiddenMonths.has(m);
      if(isHid){
        th.className='mo-hid';th.title=`Развернуть ${colLabel(m)}`;
        const lbl=document.createElement('span');lbl.className='mo-hid-lbl';lbl.textContent=MON_SHORT[colMon(m)];th.appendChild(lbl);
      } else {
        th.className='mo-clickable';
        if(m===CUR)th.classList.add('cur');
        th.textContent=colLabel(m);th.title=`Скрыть ${colLabel(m)}`;
        const rh=document.createElement('div');rh.className='resize-handle';rh.addEventListener('mousedown',e=>startResize(e,m));th.appendChild(rh);
      }
      th.onclick=()=>toggleMonth(m);
      moTr.appendChild(th);
    }
  });
  thead.appendChild(moTr);

  // body
  const tbody=$('tbody');const frag=document.createDocumentFragment();

  // heatmap
  function computeHeat(secId){
    const er=rows.filter(r=>(r.tp==='expense'||r.tp==='goal')&&(r.sec===secId||r.section===secId));
    if(er.length<2)return{};
    const avgs={};er.forEach(r=>{const v=plan[r.id]||[];avgs[r.id]=v.length?v.reduce((a,b)=>a+b,0)/v.length:0});
    const vs=Object.values(avgs);const mn=Math.min(...vs),mx=Math.max(...vs),rng=mx-mn;
    if(!rng)return{};const res={};er.forEach(r=>{res[r.id]=(avgs[r.id]-mn)/rng});return res;
  }
  const heatmap={...computeHeat('sec_fix'),...computeHeat('sec_var')};
  function heatColor(r){const h=Math.round(120-r*120);return`hsl(${h},72%,${theme==='dark'?52:44}%)`}

  const CLSMAP={income:'r-inc',expense:'r-exp',goal:'r-goal',
    tot_inc:'r-ti',tot_exp:'r-te',tot_fix:'r-te',tot_var:'r-te',tot_goals:'r-tgoals',
    net:'r-net',balance:'r-bal',account:'r-acc',tot_acc:'r-tat',
    savings:'r-sav',tot_sav:'r-tsa',debt:'r-dbt',tot_dbt:'r-tdt'};

  const skMap={};rows.forEach(r=>{if(r.tp==='ctog')skMap[r.id]=r.sk});

  // Map total row → section id, for placeholder/inline insertion
  const TOT_TO_SEC={tot_inc:'sec_inc',tot_fix:'sec_fix',tot_var:'sec_var',
    tot_acc:'sec_acc',tot_sav:'sec_sav',tot_dbt:'sec_dbt',tot_goals:'sec_goals'};

  // Pre-compute which sections have at least one data row
  const secHasRows={};
  rows.forEach(r=>{if(r.sec&&ET.includes(r.tp))secHasRows[r.sec]=true;});

  function buildPlaceholderRow(secId){
    const tr=document.createElement('tr');tr.className='r-placeholder';
    const lc=document.createElement('td');lc.className='cl';
    const btn=document.createElement('button');btn.className='add-placeholder-btn';
    btn.innerHTML='<span style="font-size:16px;line-height:1">+</span> добавить';
    btn.onclick=()=>startAddRow(secId);lc.appendChild(btn);tr.appendChild(lc);
    const dc=document.createElement('td');dc.className='cd';tr.appendChild(dc);
    addYearCells(tr,()=>{});return tr;
  }

  function buildEditingRow(secId){
    const tr=document.createElement('tr');tr.className='r-editing';
    const lc=document.createElement('td');lc.className='cl';
    const inp=document.createElement('input');inp.type='text';inp.id='new-row-inp';
    inp.className='inline-name-input';inp.placeholder='Название и Enter...';
    inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();confirmAddRow(secId);}if(e.key==='Escape')cancelAddRow();};
    inp.onblur=()=>setTimeout(()=>{if(addingTo===secId)confirmAddRow(secId);},150);
    const hint=document.createElement('span');hint.className='inline-hint';hint.textContent='Enter — сохранить · Esc — отмена';
    lc.appendChild(inp);lc.appendChild(hint);tr.appendChild(lc);
    const dc=document.createElement('td');dc.className='cd';tr.appendChild(dc);
    addYearCells(tr,()=>{});return tr;
  }

  function addYearCells(tr,fn){
    YEARS.forEach(yr=>{
      const anc=document.createElement('td');anc.className='yr-anc';tr.appendChild(anc);
      for(let m=yr.start;m<yr.start+yr.len;m++){
        const td=document.createElement('td');
        if(hiddenMonths.has(m)){
          td.classList.add('mo-hid-cell');
        } else {
          if(m===CUR)td.classList.add('cur');
          fn(td,m);
        }
        tr.appendChild(td);
      }
    });
  }

  rows.forEach(row=>{
    // Hide goals section when no goals exist
    if((row.id==='sec_goals'||row.id==='tot_goals')&&goals.length===0)return;
    // Parent heading row (non-interactive, e.g. РАСХОДЫ)
    if(row.tp==='hdg'){
      const tr=document.createElement('tr');tr.className=`r-hdg r-hdg-${row.cl}`;
      const lc=document.createElement('td');lc.className='cl';lc.textContent=row.label;tr.appendChild(lc);
      const dc=document.createElement('td');dc.className='cd';tr.appendChild(dc);
      const rest=document.createElement('td');rest.colSpan=61;tr.appendChild(rest);
      frag.appendChild(tr);return;
    }
    if(row.tp==='spacer'){const tr=document.createElement('tr');tr.className='r-sp';const td=document.createElement('td');td.colSpan=63;tr.appendChild(td);frag.appendChild(tr);return}
    if(row.tp==='ctog'){
      const DOT_COLORS={inc:'#22C55E',fix:'#EF4444',var:'#8B5CF6',acc:'rgba(237,238,245,0.35)',sav:'#8B5CF6',dbt:'#F5A524',goals:'#10b981'};
      const isOpen=sectOpen[row.sk];
      const tr=document.createElement('tr');tr.className=`ctog ctog-${row.cl}`;
      const lc=document.createElement('td');lc.className='cl';
      const inner=document.createElement('div');inner.className='sec-inner';
      // chevron SVG
      const tog=document.createElement('span');tog.className='sec-toggle-circle';
      tog.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="transition:transform .2s;transform:rotate(${isOpen?0:-90}deg)"><path d="M8 10l4 4 4-4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      // color dot
      const dot=document.createElement('span');dot.className='sec-dot';dot.style.background=DOT_COLORS[row.cl]||'rgba(255,255,255,0.3)';
      const lbl=document.createElement('span');lbl.className='sec-lbl';lbl.textContent=row.label;
      const add=document.createElement('span');add.className='sec-add';add.textContent='+';add.title='Добавить';add.onclick=e=>{e.stopPropagation();startAddRow(row.id)};
      inner.appendChild(tog);inner.appendChild(dot);inner.appendChild(lbl);inner.appendChild(add);lc.appendChild(inner);
      lc.onclick=()=>toggleSec(row.sk);tr.appendChild(lc);
      const dc=document.createElement('td');dc.className='cd';dc.onclick=()=>toggleSec(row.sk);tr.appendChild(dc);
      const rest=document.createElement('td');rest.colSpan=61;rest.onclick=()=>toggleSec(row.sk);tr.appendChild(rest);
      frag.appendChild(tr);return;
    }
    if(row.sec){const sk=skMap[row.sec];if(sk&&!sectOpen[sk])return}

    // Before total rows: insert editing row or placeholder if section is empty
    if(TOT_TO_SEC[row.id]){
      const secId=TOT_TO_SEC[row.id];
      const sk=skMap[secId];const isOpen=!sk||sectOpen[sk];
      if(isOpen){
        if(addingTo===secId) frag.appendChild(buildEditingRow(secId));
        else if(!secHasRows[secId]) frag.appendChild(buildPlaceholderRow(secId));
      }
    }

    const tr=document.createElement('tr');if(CLSMAP[row.tp])tr.className=CLSMAP[row.tp];
    if(ET.includes(row.tp)){tr.draggable=true;tr.addEventListener('dragstart',e=>onDragStart(e,row.id,row.sec));tr.addEventListener('dragover',e=>onDragOver(e,row.id,row.sec));tr.addEventListener('drop',e=>onDrop(e,row.id,row.sec));tr.addEventListener('dragend',onDragEnd)}
    // label
    const lc=document.createElement('td');lc.className='cl';
    if(ET.includes(row.tp)){
      const wrap=document.createElement('div');wrap.className='lbl-wrap';
      if((row.tp==='expense'||row.tp==='goal')&&heatmap[row.id]!==undefined){const bar=document.createElement('span');bar.className='heat-bar';bar.style.background=heatColor(heatmap[row.id]);bar.title=`${Math.round(heatmap[row.id]*100)}% от макс.`;wrap.appendChild(bar)}
      const dh=document.createElement('span');dh.className='drag-handle';dh.textContent='⠿';
      const txt=document.createElement('span');txt.className='lbl-txt';txt.textContent=row.label;txt.onclick=()=>editLabel(row.id);
      const del=document.createElement('button');del.className='del-btn';del.innerHTML='×';del.onclick=()=>deleteRow(row.id);
      wrap.appendChild(dh);wrap.appendChild(txt);wrap.appendChild(del);lc.appendChild(wrap);
    }else{lc.textContent=row.label}
    tr.appendChild(lc);
    // day
    const dc=document.createElement('td');dc.className='cd';
    if(row.tp==='debt'){const dp=document.createElement('input');dp.type='date';dp.className='date-pick';dp.value=closeDates[row.id]||'';dp.title='Дата закрытия';dp.addEventListener('change',function(){closeDates[row.id]=this.value;save();render()});dc.appendChild(dp)}
    else{dc.textContent=(row.day!=null)?row.day:''}
    tr.appendChild(dc);
    // month cells
    addYearCells(tr,(td,m)=>{
      if(ET.includes(row.tp)){
        if(row.tp==='debt'){const ds=debtSt(row.id,m);if(ds==='past'){td.classList.add('debt-past');td.textContent='—'}else{if(ds==='close')td.classList.add('debt-close');td.appendChild(makeInput(row.id,m))}}
        else{td.appendChild(makeInput(row.id,m))}
      }
      else if(row.tp==='tot_inc') {td.textContent=fmt(totInc(m));td.classList.add('pos')}
      else if(row.tp==='tot_fix') {td.textContent=fmt(totFix(m));td.classList.add('neg')}
      else if(row.tp==='tot_var') {td.textContent=fmt(totVar(m));td.classList.add('neg')}
      else if(row.tp==='tot_goals'){td.textContent=fmt(totGoals(m));td.style.color='var(--goal-cl)'}
      else if(row.tp==='tot_exp') {td.textContent=fmt(totExp(m));td.classList.add('neg')}
      else if(row.tp==='net')     {const v=totInc(m)-totExp(m);td.textContent=fmt(v);td.classList.add(cc(v))}
      else if(row.tp==='balance') {const v=cumBal(m);td.textContent=fmt(v);td.classList.add(cc(v))}
      else if(row.tp==='tot_acc') {td.textContent=fmt(totAcc(m));td.style.color='var(--sb-act)'}
      else if(row.tp==='tot_sav') {td.textContent=fmt(totSav(m));td.style.color='var(--savings)'}
      else if(row.tp==='tot_dbt') {td.textContent=fmt(totDbt(m));td.style.color='var(--debt-c)'}
    });
    frag.appendChild(tr);
  });
  tbody.innerHTML='';tbody.appendChild(frag);
  updateColVis();
  applyStickyNow();
}

// ═══════════════════════════════════════════════════
//  RENDER GOALS
// ═══════════════════════════════════════════════════
function renderGoals(){
  const grid=$('goals-grid');grid.innerHTML='';
  if(!goals.length){
    grid.innerHTML=`<div class="goals-empty"><div class="goals-icon">🎯</div><p>Пока нет целей.<br>Добавь первую!</p></div>`;return;
  }
  goals.forEach(g=>{
    const months=Math.max(1,goalMonthIdx(g.targetDate)-(CUR>=0?CUR:0));
    const totalPlan=g.monthly*months;
    const pct=Math.min(100,Math.round((g.targetAmount/totalPlan)*100));
    const card=document.createElement('div');card.className='goal-card';
    card.innerHTML=`
      <button class="goal-del" onclick="deleteGoal('${g.id}')">×</button>
      <div class="goal-card-name">${g.name}</div>
      <div class="goal-card-meta">
        <div class="goal-meta-item"><div class="goal-meta-label">Цель</div><div class="goal-meta-value">${fmt(g.targetAmount)} ₽</div></div>
        <div class="goal-meta-item"><div class="goal-meta-label">В месяц</div><div class="goal-meta-value green">${fmt(g.monthly)} ₽</div></div>
        <div class="goal-meta-item"><div class="goal-meta-label">К дате</div><div class="goal-meta-value">${g.targetDate.replace('-','/')}</div></div>
        <div class="goal-meta-item"><div class="goal-meta-label">Месяцев</div><div class="goal-meta-value">${months}</div></div>
      </div>
      <div class="goal-progress-label"><span>Прогресс плана</span><span>${pct}%</span></div>
      <div class="goal-progress-bar"><div class="goal-progress-fill" style="width:${pct}%"></div></div>`;
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════
//  JS STICKY HEADER
// ═══════════════════════════════════════════════════
let _stickyInited=false;
function initStickyHeader(){
  if(_stickyInited)return;
  _stickyInited=true;
  const wrap=$('wrap');
  if(!wrap)return;
  wrap.addEventListener('scroll',function(){
    const thead=$('thead');
    if(thead)thead.style.transform=`translateY(${this.scrollTop}px)`;
  },{passive:true});
}
function applyStickyNow(){
  const wrap=$('wrap'),thead=$('thead');
  if(wrap&&thead)thead.style.transform=`translateY(${wrap.scrollTop}px)`;
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
// Restore goals to rows on load
function restoreGoals(){goals.forEach(g=>applyGoalToRows(g))}

if(IS_DEV){$('dev-notice').style.display=''}
else{auth.onAuthStateChanged(async user=>{
  if(user){currentUser=user;if($('sb-name'))$('sb-name').textContent=user.displayName||user.email;
    $('sb-avatar').src=user.photoURL||'';$('sb-user').style.display=user.photoURL?'flex':'none';
    $('signout-btn').style.display='';showLoading();await loadFirestore();restoreGoals();showApp();render();renderGoals();initStickyHeader();applyStickyNow()}
  else{currentUser=null;showLogin()}
})}
</script>
